name: Auto Merge

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
      - closed

permissions:
  contents: write
  pull-requests: write

jobs:
  enable:
    if: github.event.action != 'closed' && github.event.pull_request.head.repo.full_name == github.repository && !github.event.pull_request.draft
    runs-on: ubuntu-latest
    steps:
      - name: Enable squash auto-merge
        env:
          GH_TOKEN: ${{ github.token }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr merge "$PR_URL" --auto --squash --delete-branch

  delete-head-branch:
    if: github.event.action == 'closed' && github.event.pull_request.merged == true && github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref != github.event.repository.default_branch
    runs-on: ubuntu-latest
    steps:
      - name: Delete merged head branch
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          if gh api "repos/$GH_REPO/git/ref/heads/$HEAD_REF" >/dev/null 2>&1; then
            gh api --method DELETE "repos/$GH_REPO/git/refs/heads/$HEAD_REF"
          else
            echo "Head branch already deleted: $HEAD_REF"
          fi
