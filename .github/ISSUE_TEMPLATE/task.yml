name: Task
description: Track maintenance, documentation, or follow-up work.
title: ""
labels:
  - enhancement
body:
  - type: textarea
    id: objective
    attributes:
      label: Objective
      description: What needs to be accomplished?
    validations:
      required: true
  - type: textarea
    id: details
    attributes:
      label: Details
      description: Add context, scope, and constraints.
  - type: textarea
    id: checklist
    attributes:
      label: Checklist
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true
  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies
      description: Link blockers or related issues.
