name: Bug report
description: Report something that is not working as expected.
title: ""
labels:
  - bug
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: List the smallest reliable reproduction steps.
      placeholder: |
        1. Configure ...
        2. Run ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: ciwatch version or commit
  - type: input
    id: os
    attributes:
      label: Operating system
  - type: textarea
    id: logs
    attributes:
      label: Relevant output
      description: Paste logs or terminal output. Remove tokens and secrets first.
      render: text
